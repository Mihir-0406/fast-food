<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            box-sizing: border-box
        }

        body {
            font-family: Verdana, sans-serif;
            margin: 0;
            background-color: black;
        }

        .home{
            background-image: url(https://raw.githubusercontent.com/freetimezp/js-eatme-06-foodio/main/assets/img/home-bg.jpg);
            /* padding-block: 12.5rem 4.25rem;
            position: relative; */
        }

        .home::before {
            content: "";
            position: absolute;
            right: 0;
            top: 30%;
            width: 980px;
            height: 400px;
            background-color: var(--second-color);
            border-radius: 12rem 0 0 12rem;
        }

        .mySlides {
            display: none
        }

        img {
            vertical-align: middle;
        }

        /* Slideshow container */
        .slideshow-container {
            max-width: 1000px;
            position: relative;
            margin: auto;
        }

        /* Next & previous buttons */
        .prev,
        .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            user-select: none;
        }

        /* Position the "next button" to the right */
        .next {
            right: -10rem;
            border-radius: 3px 0 0 3px;
        }
        .prev{
            left: -10rem;
            border-radius: 0 3px 3px 0;
        }

        /* On hover, add a black background color with a little bit see-through */
        .prev:hover,
        .next:hover {
            background-color: transparent;    /*  rgba(0, 0, 0, 0.8) */
        }

        /* Caption text */
        .text {
            color: #f2f2f2;
            font-size: 15px;
            padding: 8px 12px;
            position: absolute;
            bottom: 8px;
            width: 100%;
            text-align: center;
        }

        /* Number text (1/4 etc) */
        .numbertext {
            color: #f2f2f2;
            font-size: 12px;
            padding: 8px 12px;
            position: absolute;
            top: 0;
        }

        
        /* Fading animation */
        .fade {
            animation-name: fade;
            animation-duration: 1.5s;
        }

        @keyframes fade {
            from {
                opacity: .4
            }

            to {
                opacity: 1
            }
        }

        /* On smaller screens, decrease text size */
        @media only screen and (max-width: 300px) {

            .prev,
            .next,
            .text {
                font-size: 11px
            }
        }
    </style>
</head>

<body>
    <section class="home" id="home">
    <div class="slideshow-container">

        <div class="mySlides fade">
            <div class="numbertext">1 / 4</div>
            <img src="https://raw.githubusercontent.com/freetimezp/js-eatme-06-foodio/main/assets/img/slide-1.png" style="width:100%" alt="burger" class="home__img">
            <div class="text">Caption Text</div>
        </div>

        <div class="mySlides fade">
            <div class="numbertext">2 / 4</div>
            <img src="https://raw.githubusercontent.com/freetimezp/js-eatme-06-foodio/main/assets/img/slide-2.png" style="width:100%" alt="burger" class="home__img">
            <div class="text">Caption Two</div>
        </div>

        <div class="mySlides fade">
            <div class="numbertext">3 / 4</div>
            <img src="https://raw.githubusercontent.com/freetimezp/js-eatme-06-foodio/main/assets/img/slide-3.png" style="width:100%" alt="burger" class="home__img">
            <div class="text">Caption Three</div>
        </div>

        <div class="mySlides fade">
            <div class="numbertext">4 / 4</div>
            <img src="https://raw.githubusercontent.com/freetimezp/js-eatme-06-foodio/main/assets/img/slide-4.png" style="width:100%" alt="burger" class="home__img">
            <div class="text">Caption four</div>
        </div>

        <a class="prev" onclick="plusSlides(-1)">❮</a>
        <a class="next" onclick="plusSlides(1)">❯</a>

    </div>
    <br>
</section>



    <script>
        let slideIndex = 1;
        showSlides(slideIndex);

        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

       

        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            
            if (n > slides.length) { slideIndex = 1 }
            if (n < 1) { slideIndex = slides.length }
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            
            slides[slideIndex - 1].style.display = "block";
            
        }
    </script>

</body>

</html>
