<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap'); 
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playfair Display', serif;
        }
        body{
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: url("bgproject.jpg");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }
        section{
            position: relative;
            max-width: 400px;
            background-color: transparent;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 3rem;
        }
        h1{
            font-size: 2rem;
            color: rgb(253, 253, 253);
            text-align: center;
        }
        .inputbox{
            position: relative;
            margin: 30px 0;
            max-width: 310px;
            border-bottom: 2px solid #fff;
        }
        .inputbox label{
            position: absolute;
            top: 50%;
            left: 5px;
            transform: translateY(-50%);
            color: #fff;
            font-size: 1rem;
            pointer-events: none;
            transition: all 0.5s ease-in-out;
        }
        input:focus ~ label,
        input:valid ~ label {
            top: -5px;
        }
        .inputbox input{
            width: 100%;
            height: 60px;
            background: transparent;
            border: none;
            outline: none;
            font-size: 1rem;
            padding: 0 35px 0 5px;
            color: #fff;
        }
        .inputbox i{
            position: absolute;
            right: 8px;
            color: #fff;
            font-size: 1.2rem;
            top: 20px;
        }
        #toggle{
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            right: 29px;
            background: url(show.png);
            background-size: cover;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }
        #toggle.hide{
            background: url(hide.png);
            background-size: cover;
        }
        .forgot{
            margin: 35px 0;
            font-size: 0.85rem;
            color: #fff;
            display: flex;
            justify-content: space-between;
            column-gap: 28px;
        }
        .forgot label{
            display: flex;
            align-items: center;
        }
        .forgot label input{
            margin-right: 3px;
        }
        .forgot a{
            color: #fff;
            text-decoration: none;
            font-weight: 500;
        }
        .forgot a:hover{
            text-decoration: underline;
        }
        button{
            width: 100%;
            height: 40px;
            border-radius: 40px;
            background-color: rgba(255, 255, 255, 1);
            border: none;
            outline: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.4s ease;
        }
        button:hover{
            background-color: rgba(255, 255, 255, 0.5);
        }
        .register{
            font-size: 0.9rem;
            color: #fff;
            font-weight: 500;
        }
        .register p a{
            color: #fff;
        }
        .register p a:hover{
            text-decoration: underline;
        }
    </style>
    <title>Login Page</title>
</head>
<body>
    <section>
        <form>
            <h1>Login</h1>
            <div class="inputbox">
                <i class="fa-solid fa-envelope"></i>                
                <input type="email" required>
                <label for="">Email</label>
            </div>
            <div class="inputbox">
                <i class="fa-solid fa-lock"></i>                
                <input type="password" required>
                <label for="">Password</label>
            <div id="toggle" onclick="showHide();"></div>
            </div>
            <div class="forgot">
                <label for=""><input type="checkbox">Remember Me</label>
                <a href="#">Forgot Password?</a>
            </div>
            <button>Log in</button>
            <div class="register">
                <p>Don't Have An Account? <a href="/HTML/Project/registration.html">Register</a></p>
            </div>
        </form>
    </section>
</body>
</html>
