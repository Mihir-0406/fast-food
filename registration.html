<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap'); 
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playfair Display', serif;
        }
        body{
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: url("/HTML/Project/registerform.jpg");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }
        section{
            position: relative;
            max-width: 400px;
            background-color: transparent;
            border: 2px solid rgba(97, 97, 97, 0.5);
            border-radius: 20px;
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 3rem;
        }
        h1{
            font-size: 2rem;
            color: rgb(58, 48, 48);
            text-align: center;
        }
        .inputbox{
            position: relative;
            margin: 10px 0;
            max-width: 310px;
            border-bottom: 2px solid rgb(88, 74, 74);
        }
        .inputbox label{
            position: absolute;
            top: 50%;
            left: 1px;
            transform: translateY(-50%);
            color: rgb(88, 74, 74);
            font-size: 1rem;
            pointer-events: none;
            transition: all 0.5s ease-in-out;
        }
        input:focus ~ label,
        input:valid ~ label {
            top: -0.5px;
        }
        .inputbox input{
            width: 100%;
            height: 55px;
            background: transparent;
            border: none;
            outline: none;
            font-size: 1rem;
            padding: 0 35px 0 5px;
            color: rgb(88, 74, 74);
        }
        .inputbox i{
            position: absolute;
            right: 8px;
            color: rgb(0, 0, 0);
            font-size: 1.2rem;
            top: 20px;
        }
        .forgot{
            margin: 35px 0;
            font-size: 0.85rem;
            color: rgb(0, 0, 0);
            display: flex;
            justify-content: space-between;
            column-gap: 28px;
        }
        .forgot label{
            display: flex;
            align-items: center;
        }
        .forgot label input{
            margin-right: 3px;
        }
        .forgot a{
            color: rgb(0, 0, 0);
            text-decoration: none;
            font-weight: 500;
        }
        .forgot a:hover{
            text-decoration: underline;
        }
        button{
            width: 100%;
            height: 40px;
            border-radius: 40px;
            background-color: rgb(88, 74, 74);
            border: none;
            outline: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.4s ease;
        }
        button:hover{
            background-color: rgb(114, 108, 108);
        }
        .register{
            font-size: 0.9rem;
            color: rgb(44, 30, 30);
            font-weight: 500;
        }
        .register p a{
            color: rgb(53, 39, 39);
        }
        .register p a:hover{
            text-decoration: underline;
        }
    </style>
    <title>Registration Form</title>
</head>
<body>
    <section>
        <form>
            <h1>Registration</h1>
            <div class="inputbox">                
                <input type="first name" required>
                <label for="">First Name</label>
            </div>
            <div class="inputbox">                
                <input type="last name" required>
                <label for="">Last Name</label>
            </div>
            <div class="inputbox">                
                <input type="email" required>
                <label for="">Email</label>
            </div>
            <div class="inputbox">                
                <input type="password" required>
                <label for="">Create Password</label>
            </div>
            <div class="inputbox">                
                <input type="password" required>
                <label for="">Confirm Password</label>
            </div>
            <div class="forgot">
                <label for=""><input type="checkbox">Remember Me</label>
                <a href="#">Forgot Password?</a>
            </div>
            <button>SUBMIT</button>
            <div class="register">
                <p>Do You Have Account? <a href="/HTML/Project/Login.html"> Login </a></p>
            </div>
        </form>
    </section>
</body>
</html>
